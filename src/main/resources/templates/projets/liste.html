<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Liste des Projets</title>
</head>

<body>

    <h1>Liste des Projets</h1>

    <a href="/projets/nouveau">Ajouter un projet</a>

    <table border="1">
        <thead>
            <tr>
                <th>Code</th>
                <th>Nom</th>
                <th>Type</th>
                <th>Région</th>
                <th>Statut</th>
                <th>Taux d'avancement</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="projet : ${projets}">
                <td th:text="${projet.code}"></td>
                <td th:text="${projet.nom}"></td>
                <td th:text="${projet.type}"></td>
                <td>
                    <span th:each="localite, stat : ${projet.localites}">
                        <span th:text="${localite.region}"></span>
                        <span th:if="${!stat.last}">, </span>
                    </span>
                </td>
                <td th:text="${projet.statut}"></td>
                <td th:text="${projet.tauxAvancement}"></td>
            
            <td>
                <a th:href="@{/projets/{id}(id=${projet.id})}"> Voir</a>
                &nbsp;
                <a th:href="@{/projets/{id}/modifier(id=${projet.id})}"> Modifier</a>
                &nbsp;
                <a th:href="@{/projets/{id}/supprimer(id=${projet.id})}"
                    onclick="return confirm('Voulez-vous vraiment supprimer ce projet ?')">
                    Supprimer
                </a>
            </td>
           </tr>  
        </tbody>
    </table>

</body>

</html>
