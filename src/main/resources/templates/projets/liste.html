<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout/main}">

<head>
    <title>Liste des Projets</title>
</head>

<body>
    <div layout:fragment="contenu">

        <h2 class="page-title">Liste des Projets</h2>

        <div class="mb-3">
            <a href="/projets/nouveau" class="btn btn-masae">
                + Ajouter un projet
            </a>
        </div>

        <div class="table-responsive">
            <table class="table table-bordered table-hover">
                <thead>
                    <tr>
                        <th>Code</th>
                        <th>Nom</th>
                        <th>Type</th>
                        <th>Région(s)</th>
                        <th>Statut</th>
                        <th>Activités</th>
                        <th>Taux global</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="projet : ${projets}">
                        <td th:text="${projet.code}"></td>
                        <td th:text="${projet.nom}"></td>
                        <td th:text="${projet.type}"></td>
                        <td>
                            <span th:each="localite, stat : ${projet.localites}">
                                <span th:text="${localite.region}"></span>
                                <span th:if="${!stat.last}">, </span>
                            </span>
                        </td>
                        <td>
                            <span th:text="${projet.statut}"
                                th:classappend="${projet.statut == 'En cours'} ? 'badge bg-success' : 
                                                  (${projet.statut == 'Planifié'} ? 'badge bg-primary' : 
                                                  (${projet.statut == 'Terminé'} ? 'badge bg-secondary' : 'badge bg-warning'))">
                            </span>
                        </td>
                        <td>
                            <span class="badge bg-secondary"
                                th:text="${projet.activites != null ? projet.activites.size() : 0} + ' activité(s)'">
                            </span>
                        </td>
                        <td>
                            <div class="progress" style="height: 20px;">
                                <div class="progress-bar bg-success"
                                    th:style="'width: ' + ${projet.tauxAvancement != null ? projet.tauxAvancement : 0} + '%'"
                                    th:text="${projet.tauxAvancement != null ? projet.tauxAvancement + '%' : '0%'}">
                                </div>
                            </div>
                        </td>
                        <td>
                            <a th:href="@{/projets/{id}(id=${projet.id})}" class="btn btn-sm btn-outline-success">👁️
                                Voir</a>
                            <a th:href="@{/projets/{id}/modifier(id=${projet.id})}"
                                class="btn btn-sm btn-outline-primary">✏️</a>
                            <a th:href="@{/projets/{id}/supprimer(id=${projet.id})}"
                                class="btn btn-sm btn-outline-danger"
                                onclick="return confirm('Voulez-vous vraiment supprimer ce projet ?')">🗑️</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

    </div>
</body>

</html>
