<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">

<head>
    <title>Détail du Projet</title>
</head>

<body>
    <div layout:fragment="contenu">

        <h2 class="page-title" th:text="${projet.nom}"></h2>

        <div class="card card-masae p-4" style="max-width: 900px;">

            <div class="row mb-3">
                <div class="col-md-6">
                    <span class="label-masae">Code :</span>
                    <span th:text="${projet.code}"></span>
                </div>
                <div class="col-md-6">
                    <span class="label-masae">Type :</span>
                    <span th:text="${projet.type}"></span>
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-md-12">
                    <span class="label-masae">Description :</span>
                    <p th:text="${projet.description}"></p>
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-md-6">
                    <span class="label-masae">Date de début prévue :</span>
                    <span th:text="${projet.dateDebutPrevue}"></span>
                </div>
                <div class="col-md-6">
                    <span class="label-masae">Date de fin prévue :</span>
                    <span th:text="${projet.dateFinPrevue}"></span>
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-md-6">
                    <span class="label-masae">Statut :</span>
                    <span th:text="${projet.statut}"
                          th:classappend="${projet.statut == 'En cours'} ? 'badge bg-success' : 
                                          (${projet.statut == 'Planifié'} ? 'badge bg-primary' : 
                                          (${projet.statut == 'Terminé'} ? 'badge bg-secondary' : 'badge bg-warning'))">
                    </span>
                </div>
                <div class="col-md-6">
                    <span class="label-masae">Taux d'avancement :</span>
                    <span th:text="${projet.tauxAvancement != null ? projet.tauxAvancement + '%' : '0%'}"></span>
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-md-6">
                    <span class="label-masae">Responsable :</span>
                    <span th:text="${projet.responsable}"></span>
                </div>
                <div class="col-md-6">
                    <span class="label-masae">Date de création :</span>
                    <span th:text="${projet.dateCreation}"></span>
                </div>
            </div>

            <div class="mb-3">
                <span class="label-masae">Localités :</span>
                <ul class="mt-2">
                    <li th:each="localite : ${projet.localites}">
                        <span th:text="${localite.region}"></span> /
                        <span th:text="${localite.departement}"></span>
                        <span th:if="${localite.commune != null && !localite.commune.empty}">
                            / <span th:text="${localite.commune}"></span>
                        </span>
                    </li>
                </ul>
            </div>

            <div class="mt-4">
                <a th:href="@{/projets/{id}/modifier(id=${projet.id})}" 
                   class="btn btn-masae">✏️ Modifier</a>
                <a th:href="@{/projets/{id}/supprimer(id=${projet.id})}"
                   class="btn btn-outline-danger ms-2"
                   onclick="return confirm('Voulez-vous vraiment supprimer ce projet ?')">
                   🗑️ Supprimer
                </a>
                <a href="/projets" class="btn btn-outline-secondary ms-2">← Retour</a>
            </div>

        </div>

    </div>
</body>
</html>
