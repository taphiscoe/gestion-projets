<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">

<head>
    <title>Nouveau Projet</title>
</head>

<body>
    <div layout:fragment="contenu">

        <h2 class="page-title">Ajouter un nouveau projet</h2>

        <div class="card card-masae p-4" style="max-width: 800px;">
            <form th:action="@{/projets}" method="post">

                <div class="mb-3">
                    <label for="code" class="label-masae">Code :</label>
                    <input type="text" id="code" name="code" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label for="nom" class="label-masae">Nom :</label>
                    <input type="text" id="nom" name="nom" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label for="description" class="label-masae">Description :</label>
                    <textarea id="description" name="description" class="form-control" rows="3"></textarea>
                </div>

                <div class="mb-3">
                    <label for="type" class="label-masae">Type :</label>
                    <select id="type" name="type" class="form-select" required>
                        <option value="">--Sélectionnez un type--</option>
                        <option value="Agriculture">Agriculture</option>
                        <option value="Elevage">Elevage</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="label-masae">Localités du projet :</label>
                    <div id="localites-container">
                        <div id="localite-1" class="row mb-2">
                            <div class="col-md-4">
                                <select name="regions" class="form-select" 
                                        onchange="chargerDepartementsLigne(this, 1)" required>
                                    <option value="">--Région--</option>
                                    <option value="Dakar">Dakar</option>
                                    <option value="Thiès">Thiès</option>
                                    <option value="Diourbel">Diourbel</option>
                                    <option value="Saint-Louis">Saint-Louis</option>
                                    <option value="Louga">Louga</option>
                                    <option value="Fatick">Fatick</option>
                                    <option value="Kaolack">Kaolack</option>
                                    <option value="Kaffrine">Kaffrine</option>
                                    <option value="Tambacounda">Tambacounda</option>
                                    <option value="Kédougou">Kédougou</option>
                                    <option value="Kolda">Kolda</option>
                                    <option value="Ziguinchor">Ziguinchor</option>
                                    <option value="Sédhiou">Sédhiou</option>
                                    <option value="Matam">Matam</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <select name="departements" id="departement-1" class="form-select" required>
                                    <option value="">--Département--</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <input type="text" name="communes" class="form-control" placeholder="Commune (optionnel)"/>
                            </div>
                        </div>
                    </div>
                    <button type="button" class="btn btn-sm btn-outline-success mt-2" onclick="ajouterLocalite()">
                        + Ajouter une localité
                    </button>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="dateDebutPrevue" class="label-masae">Date de début prévue :</label>
                        <input type="date" id="dateDebutPrevue" name="dateDebutPrevue" class="form-control" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="dateFinPrevue" class="label-masae">Date de fin prévue :</label>
                        <input type="date" id="dateFinPrevue" name="dateFinPrevue" class="form-control" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="statut" class="label-masae">Statut :</label>
                    <select id="statut" name="statut" class="form-select" required>
                        <option value="">--Sélectionnez un statut--</option>
                        <option value="Planifié">Planifié</option>
                        <option value="En cours">En cours</option>
                        <option value="Terminé">Terminé</option>
                        <option value="Suspendu">Suspendu</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label for="responsable" class="label-masae">Responsable :</label>
                    <input type="text" id="responsable" name="responsable" class="form-control" required>
                </div>

                <div class="mt-4">
                    <button type="submit" class="btn btn-masae">💾 Sauvegarder</button>
                    <a href="/projets" class="btn btn-outline-secondary ms-2">Annuler</a>
                </div>

            </form>
        </div>

    </div>
    <script th:src="@{/js/localites.js}"></script>
</body>
</html>
