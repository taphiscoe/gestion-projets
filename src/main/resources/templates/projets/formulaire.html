<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Nouveau Projet</title>
</head>

<body>

    <h1>Ajouter un nouveau projet</h1>

    <form th:action="@{/projets}" method="post">
        <label for="code">Code:</label>
        <input type="text" id="code" name="code" required><br><br>

        <label for="nom">Nom:</label>
        <input type="text" id="nom" name="nom" required><br><br>

        <label for="description">Description:</label>
        <textarea id="description" name="description" required></textarea><br><br>

        <label for="type">Type:</label>
        <select id="type" name="type" required>
            <option value="">--Sélectionnez un type--</option>
            <option value="Agriculture">Agriculture</option>
            <option value="Elevage">Elevage</option>
        </select> <br><br>

        <label for="region">Région :</label>
        <select id="region" name="region" onchange="chargerDepartements()" required>
            <option value="">--Sélectionnez une région--</option>
            <option value="Dakar">Dakar</option>
            <option value="Thiès">Thiès</option>
            <option value="Diourbel">Diourbel</option>
            <option value="Saint-Louis">Saint-Louis</option>
            <option value="Louga">Louga</option>
            <option value="Fatick">Fatick</option>
            <option value="Kaolack">Kaolack</option>
            <option value="Kaffrine">Kaffrine</option>
            <option value="Tambacounda">Tambacounda</option>
            <option value="Kédougou">Kédougou</option>
            <option value="Kolda">Kolda</option>
            <option value="Ziguinchor">Ziguinchor</option>
            <option value="Sédhiou">Sédhiou</option>
            <option value="Matam">Matam</option>
        </select><br><br>

        <label for="departement">Département :</label>
        <select id="departement" name="departement" required>
            <option value="">--Sélectionnez d'abord une région--</option>
        </select><br><br>

        <label for="commune">Commune :</label>
        <input type="text" id="commune" name="commune" /><br><br>

        <label for="dateDebutPrevue">Date de début prévue:</label>
        <input type="date" id="dateDebutPrevue" name="dateDebutPrevue" required><br><br>

        <label for="dateFinPrevue">Date de fin prévue:</label>
        <input type="date" id="dateFinPrevue" name="dateFinPrevue" required><br><br>

        <label for="statut">Statut:</label>
        <select name="statut" id="statut" required>
            <option value="">--Sélectionnez un statut--</option>
            <option value="Planifié">Planifié</option>
            <option value="En cours">En cours</option>
            <option value="Terminé">Terminé</option>
            <option value="Suspendu">Suspendu</option>
        </select><br><br>

        <label for="responsable">Responsable:</label>
        <input type="text" id="responsable" name="responsable" required><br><br>

        <button type="submit">Ajouter</button>
        <a href="/projets">Annuler</a>
    </form>
<script th:src="@{/js/localites.js}"></script>
</body>

</html>
