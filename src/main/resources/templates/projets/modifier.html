<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Modifier le Projet</title>
</head>

<body>

    <h1>Modifier le Projet</h1>

    <form th:action="@{/projets/{id}/modifier(id=${projet.id})}" method="post">

        <label for="code">Code :</label>
        <input type="text" id="code" name="code" th:value="${projet.code}" required><br><br>

        <label for="nom">Nom :</label>
        <input type="text" id="nom" name="nom" th:value="${projet.nom}" required><br><br>

        <label for="description">Description :</label>
        <textarea id="description" name="description" th:text="${projet.description}"></textarea><br><br>

        <label for="type">Type :</label>
        <select id="type" name="type" required>
            <option value="Agriculture" th:selected="${projet.type == 'Agriculture'}">Agriculture</option>
            <option value="Elevage" th:selected="${projet.type == 'Elevage'}">Elevage</option>
        </select><br><br>

        <label for="dateDebutPrevue">Date de début prévue :</label>
        <input type="date" id="dateDebutPrevue" name="dateDebutPrevue" th:value="${projet.dateDebutPrevue}"
            required><br><br>

        <label for="dateFinPrevue">Date de fin prévue :</label>
        <input type="date" id="dateFinPrevue" name="dateFinPrevue" th:value="${projet.dateFinPrevue}" required><br><br>

        <label for="statut">Statut :</label>
        <select id="statut" name="statut" required>
            <option value="Planifié" th:selected="${projet.statut == 'Planifié'}">Planifié</option>
            <option value="En cours" th:selected="${projet.statut == 'En cours'}">En cours</option>
            <option value="Terminé" th:selected="${projet.statut == 'Terminé'}">Terminé</option>
            <option value="Suspendu" th:selected="${projet.statut == 'Suspendu'}">Suspendu</option>
        </select><br><br>

        <label for="responsable">Responsable :</label>
        <input type="text" id="responsable" name="responsable" th:value="${projet.responsable}" required><br><br>

        <button type="submit">Sauvegarder</button>
        <a th:href="@{/projets/{id}(id=${projet.id})}">Annuler</a>

    </form>

</body>

</html>
