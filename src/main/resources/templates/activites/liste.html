<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">

<head>
    <title>Activités du Projet</title>
</head>

<body>
    <div layout:fragment="contenu">

        <h2 class="page-title">
            Activités du projet : <span th:text="${projet.nom}"></span>
        </h2>

        <div class="mb-3">
            <a th:href="@{/projets/{id}/activites/nouveau(id=${projet.id})}" 
               class="btn btn-masae">+ Ajouter une activité</a>
            <a th:href="@{/projets/{id}(id=${projet.id})}" 
               class="btn btn-outline-secondary ms-2">← Retour au projet</a>
        </div>

        <div class="table-responsive">
            <table class="table table-bordered table-hover">
                <thead>
                    <tr>
                        <th>Intitulé</th>
                       
                        <th>Date début prévue</th>
                        <th>Date fin prévue</th>
                        <th>Montant prévu</th>
                        <th>Montant utilisé</th>
                        <th>Taux</th>
                        <th>Statut</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="activite : ${activites}">
                        <td th:text="${activite.intitule}"></td>
                       
                        <td th:text="${activite.dateDebutPrevue}"></td>
                        <td th:text="${activite.dateFinPrevue}"></td>
                        <td th:text="${activite.montantPrevu != null ? #numbers.formatDecimal(activite.montantPrevu, 0, 'COMMA', 0, 'POINT') + ' FCFA' : '-'}"></td>
                        <td th:text="${activite.montantUtilise != null ? #numbers.formatDecimal(activite.montantUtilise, 0, 'COMMA', 0, 'POINT') + ' FCFA' : '-'}"></td>
                        <td th:text="${activite.tauxRealisation != null ? activite.tauxRealisation + '%' : '0%'}"></td>
                        <td>
                            <span th:text="${activite.statut}"
                                  th:classappend="${activite.statut == 'En cours'} ? 'badge bg-success' : 
                                                  (${activite.statut == 'Planifiée'} ? 'badge bg-primary' : 
                                                  (${activite.statut == 'Terminée'} ? 'badge bg-secondary' : 'badge bg-danger'))">
                            </span>
                        </td>
                        <td>
                            <a th:href="@{/projets/{pid}/activites/{id}(pid=${projet.id}, id=${activite.id})}" 
                               class="btn btn-sm btn-outline-success">👁️ Voir</a>
                            <a th:href="@{/projets/{pid}/activites/{id}/modifier(pid=${projet.id}, id=${activite.id})}" 
                               class="btn btn-sm btn-outline-primary">✏️</a>
                            <a th:href="@{/projets/{pid}/activites/{id}/supprimer(pid=${projet.id}, id=${activite.id})}"
                               class="btn btn-sm btn-outline-danger"
                               onclick="return confirm('Supprimer cette activité ?')">🗑️</a>
                        </td>
                    </tr>
                    <tr th:if="${activites.empty}">
                        <td colspan="9" class="text-center text-muted">
                            Aucune activité pour ce projet
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

    </div>
</body>
</html>
