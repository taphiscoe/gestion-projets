<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <title layout:title-pattern="$CONTENT_TITLE - MASAE">MASAE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .drapeau-bar {
            height: 5px;
            background: linear-gradient(to right, 
                #00853F 33%, 
                #FDEF42 33%, 
                #FDEF42 66%, 
                #E31B23 66%);
        }

        .navbar-masae {
            background-color: #1a5c38;
            padding: 0.8rem 2rem;
        }

        .navbar-masae .logo-text {
            font-size: 1.8rem;
            font-weight: 900;
            color: white;
            letter-spacing: 2px;
        }

        .navbar-masae .logo-subtitle {
            font-size: 0.65rem;
            color: #a8d5b5;
            display: block;
            letter-spacing: 0.5px;
        }

        .navbar-masae .nav-link {
            color: #d4edda !important;
            font-size: 0.9rem;
            padding: 0.5rem 1rem !important;
        }

        .navbar-masae .nav-link:hover {
            color: white !important;
            background-color: rgba(255,255,255,0.1);
            border-radius: 4px;
        }

        .main-content {
            padding: 2rem;
            min-height: calc(100vh - 140px);
        }

        .page-title {
            color: #1a5c38;
            font-weight: 700;
            border-left: 4px solid #FDEF42;
            padding-left: 1rem;
            margin-bottom: 1.5rem;
        }

        .table thead {
            background-color: #1a5c38;
            color: white;
        }

        .table tbody tr:hover {
            background-color: #f0f7f2;
        }

        .btn-masae {
            background-color: #1a5c38;
            color: white;
            border: none;
        }

        .btn-masae:hover {
            background-color: #144d2e;
            color: white;
        }

        .footer-masae {
            background-color: #1a5c38;
            color: #a8d5b5;
            text-align: center;
            padding: 1rem;
            font-size: 0.8rem;
        }

        .card-masae {
            border-left: 4px solid #1a5c38;
            border-radius: 4px;
        }

        .label-masae {
            color: #1a5c38;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <!-- Barre drapeau -->
    <div class="drapeau-bar"></div>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-masae">
        <div class="container-fluid">
            <a class="navbar-brand" href="/projets">
                <span class="logo-text">MASAE</span>
                <span class="logo-subtitle">Ministère de l'Agriculture, de la Souveraineté Alimentaire et de l'Élevage</span>
            </a>
            <div class="collapse navbar-collapse justify-content-end">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="/projets">📋 Projets</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">👥 Utilisateurs</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">🗺️ Carte</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Contenu de la page -->
    <div class="main-content">
        <div class="container-fluid">
            <div layout:fragment="contenu">
                <!-- Le contenu de chaque page sera inséré ici -->
            </div>
        </div>
    </div>

    <!-- Footer -->
    <div class="footer-masae">
        © 2026 MASAE — Ministère de l'Agriculture, de la Souveraineté Alimentaire et de l'Élevage — République du Sénégal
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
